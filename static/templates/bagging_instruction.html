<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>袋詰指示書</title>
    <style>
        /* A4サイズの設定 */
        @page {
            size: A4;
            margin: 10mm 15mm; /* 左右マージンを広げて見切れを防止 */
        }
        
        body {
            font-family: 'MS Gothic', monospace;
            padding: 0;
            margin: 0;
            font-size: 11px;
            color: #000; /* 文字色を明示的に黒に設定 */
        }
        .container {
            width: 180mm; /* A4幅に余裕を持たせて見切れを防止 */
            margin: 0 auto;
            padding: 2mm 0;
        }
        
        /* 印刷時の設定 */
        @media print {
            body {
                margin: 0;
                padding: 0;
            }
            .container {
                width: 100%;
                padding: 0;
            }
        }
        
        .header {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        .timestamp {
            text-align: right;
            font-size: 10px;
            margin-bottom: 5px;
        }
        
        /* 上部セクション - 高さを統一 */
        .top-section {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
            align-items: stretch; /* 両側の高さを揃える */
        }
        
        .left-table {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .left-table table {
            height: 100%;
        }
        
        /* 左側テーブルの行の高さを固定 */
        .left-table tr {
            height: 22px; /* 固定高 */
        }
        
        /* 印欄行だけ高さを別途指定 */
        .left-table tr:last-child {
            height: 52px; /* 印欄の高さ */
        }
        
        .right-table {
            flex: 2;
            display: flex;
            flex-direction: column;
        }
        
        .right-table table {
            height: 100%;
        }
        
        /* 右側テーブルのヘッダー行 */
        .right-table thead tr {
            height: 18px;
        }
        
        /* 右側テーブルのデータ行の高さを左側に合わせる */
        .right-table tbody tr {
            height: 14px; /* 10行で左側の12行分の高さに調整 */
        }
        
        /* 右側テーブルの最終行（合計行） */
        .right-table tbody tr:last-child {
            height: 18px;
        }
        
        table {
            border-collapse: collapse;
            width: 100%;
        }
        
        th, td {
            border: 1px solid #000;
            padding: 1px 2px;
            text-align: left;
            font-size: 12px;
            line-height: 1.1;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #000; /* 文字色を明示的に黒に設定 */
        }
        
        th {
            background-color: #f0f0f0;
            font-weight: normal;
        }
        
        /* 左上のテーブルのカラム幅を3:4に設定 */
        .left-table th {
            width: 40%;  /* 3/7 */
            text-align: center;  /* 項目を中央揃え */
        }
        
        .left-table td {
            width: 60%;  /* 4/7 */
            text-align: right;  /* 値を右揃え */
        }
        
        /* キット名称と冷却設備は左寄せ */
        .left-table td#kitName,
        .left-table td#coolingEquipment {
            text-align: left !important;
            padding-left: 5px;
        }
        
        /* 右上のテーブルの単位列を中央揃え */
        .right-table tbody td:nth-child(6) {
            text-align: center;
        }
        
        /* 右上のテーブルの数値列を右寄せ */
        .right-table tbody td:nth-child(4),  /* 規格数量 */
        .right-table tbody td:nth-child(5) {  /* 総数量 */
            text-align: right;
            padding-right: 5px;
        }
        
        /* 右上のテーブルの最終行（合計行）の文言を右寄せ */
        .right-table tbody tr:last-child th {
            text-align: right;
            padding-right: 5px;
        }
        
        /* 右上のテーブルの最終行の数値も右寄せ */
        .right-table tbody tr:last-child th:nth-child(2),  /* 規格袋合計の値 */
        .right-table tbody tr:last-child th:nth-child(4) {  /* 規格外袋合計の値 */
            text-align: right !important;
            padding-right: 5px;
        }
        
        .circle-mark {
            width: 40px;
            height: 40px;
            border: 2px solid #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            float: left;
            margin-right: 10px;
        }
        
        .mark-b {
            font-size: 24px;
        }
        
        /* メインテーブル - 20行固定 */
        .main-table {
            width: 100%;
            margin-top: 5px;
            table-layout: fixed; /* テーブルの幅を固定 */
        }
        
        .main-table th {
            background-color: #f0f0f0;
            text-align: center;
            font-size: 14px;
            padding: 2px 1px;
            line-height: 1.0;
            word-wrap: break-word; /* 長い文言を折り返す */
            white-space: normal; /* 折り返しを許可 */
        }
        
        .main-table .item-header {
            height: 24px; /* ヘッダー高さを調整 */
            vertical-align: middle;
        }
        
        .main-table .unit-header {
            height: 14px; /* 単位行の高さを調整 */
            vertical-align: middle;
        }
        
        /* メインテーブルのデータ行を2行分の高さで固定 */
        .main-table tbody tr {
            height: 22px !important; /* 2行分の高さ */
            min-height: 22px !important;
            max-height: 22px !important;
        }
        
        .main-table td {
            text-align: right; /* 数値は右寄せ */
            padding: 0 !important; /* paddingを0に */
            font-size: 11px;
            height: 22px !important; /* 2行分の高さ */
            min-height: 22px !important;
            max-height: 22px !important;
            overflow: hidden;
            vertical-align: top;
            box-sizing: border-box;
        }
        
        /* セル内のコンテンツラッパー */
        .main-table td .cell-content {
            height: 22px;
            min-height: 22px;
            max-height: 22px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-end; /* 右寄せ */
            padding: 1px 3px;
            font-size: 11px;
            line-height: 14px;
            word-wrap: break-word;
            white-space: normal;
            box-sizing: border-box;
        }
        
        /* 施設名（左寄せ） - より詳細度の高いセレクタ */
        .main-table tbody tr td:first-child .cell-content,
        .main-table tbody tr.total-row td:first-child .cell-content {
            justify-content: flex-start !important; /* 左寄せ */
            text-align: left !important;
        }
        
        /* 規格外袋（端数）の11列（3-13列目）のフォントサイズを9pxに */
        .main-table tbody td:nth-child(n+3):nth-child(-n+13) .cell-content {
            font-size: 9px;
        }
        
        /* 合計行の規格外袋（端数）の11列（3-13列目）も9pxに */
        .main-table tfoot td:nth-child(n+3):nth-child(-n+13) .cell-content {
            font-size: 9px;
        }
        
        /* 合計行 */
        .main-table tfoot tr {
            height: 22px !important;
            min-height: 22px !important;
            max-height: 22px !important;
        }
        
        /* 合計行のセルも固定高さに */
        .main-table tfoot td {
            height: 22px !important;
            min-height: 22px !important;
            max-height: 22px !important;
            overflow: hidden !important;
            padding: 0 !important;
        }
        
        .main-table tfoot td .cell-content {
            height: 22px;
            min-height: 22px;
            max-height: 22px;
        }
        
        .total-row {
            font-weight: bold;
            background-color: #f0f0f0;
            height: 22px !important;
            min-height: 22px !important;
            max-height: 22px !important;
        }
        
        /* 合計行のセル */
        .total-row td {
            height: 22px !important;
            min-height: 22px !important;
            max-height: 22px !important;
            padding: 0 !important;
        }
        
        /* 合計行のセルコンテンツ */
        .total-row td .cell-content {
            font-weight: bold;
        }
        
        .stamp-cell {
            text-align: center;
            font-size: 14px;
        }
        
        .spec-bags-col {
            width: 5%;
        }
        
        .extra-bags-header {
            width: 18%;
        }
        
        .extra-bags-col {
            width: 9%;
        }
        
        .empty-col {
            width: 3%;
        }
        
        .total-col {
            width: 8%;
        }
        
        /* 印刷時の微調整 */
        @media print {
            .main-table tbody tr {
                page-break-inside: avoid;
                height: 26px !important;
                min-height: 26px !important;
                max-height: 26px !important;
            }

            .main-table td {
                height: 26px !important;
                min-height: 26px !important;
                max-height: 26px !important;
            }
            
            .main-table td .cell-content {
                height: 26px !important;
                min-height: 26px !important;
                max-height: 26px !important;
            }
            
            .total-row {
                height: 26px !important;
                min-height: 26px !important;
                max-height: 26px !important;
            }
                
            .total-row td {
                height: 25px !important;
                min-height: 25px !important;
                max-height: 25px !important;
            }
            
            /* ページに収まるよう全体を微調整 */
            .container {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 手B+喫食日、袋詰指示書、タイムスタンプを横並び -->
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 5px; align-items: center;">
            <!-- 左列: 手 + (B+喫食日の縦並び) - さらに3:4に分割 -->
            <div style="display: grid; grid-template-columns: 3fr 4fr; gap: 10px; align-items: center;">
                <div class="circle-mark" style="float: none; margin: 0; justify-self: center;">
                    <span style="font-size: 18px;">手</span>
                </div>
                <div>
                    <div style="font-size: 24px; font-weight: bold; line-height: 1; margin-bottom: 2px;" id="mealType">B</div>
                    <div style="font-size: 14px; white-space: nowrap;" id="eatingDateInfo">
                    </div>
                </div>
            </div>
            
            <!-- 中央列: 袋詰指示書 -->
            <div class="header" style="margin: 0; text-align: center; justify-self: center;">袋詰指示書</div>

            <!-- 右列: タイムスタンプ -->
            <div class="timestamp" style="margin: 0; text-align: right; justify-self: end;" id="printDate"></div>
        </div>
        
        <div class="top-section">
            <!-- 左上のテーブル -->
            <div class="left-table">
                <table>
                    <tr>
                        <th>製造日</th>
                        <td id="productionDate"></td>
                    </tr>
                    <tr>
                        <th>キットコード</th>
                        <td id="kitCode"></td>
                    </tr>
                    <tr>
                        <th>キット名称</th>
                        <td id="kitName"></td>
                    </tr>
                    <tr>
                        <th>調理区分</th>
                        <td id="cookingType"></td>
                    </tr>
                    <tr>
                        <th>規格</th>
                        <td id="grade"></td>
                    </tr>
                    <tr>
                        <th>殺菌温度</th>
                        <td id="sterilizationTemp">95℃ 45分</td>
                    </tr>
                    <tr>
                        <th>食数</th>
                        <td id="mealCount"></td>
                    </tr>
                    <tr>
                        <th>在庫数</th>
                        <td id="stockQuantity"></td>
                    </tr>
                    <tr>
                        <th>注番</th>
                        <td id="orderNumber"></td>
                    </tr>
                    <tr>
                        <th>冷却設備</th>
                        <td id="coolingEquipment"></td>
                    </tr>
                    <tr>
                        <th>冷却温度</th>
                        <td id="coolingTemp">℃</td>
                    </tr>
                    <tr>
                        <th>担当者</th>
                        <td id="supervisor"></td>
                    </tr>
                    <tr>
                        <td colspan="2" style="padding: 0; border-top: none;">
                            <table style="width: 100%; margin: 0; border-collapse: collapse; table-layout: fixed;">
                                <tr>
                                    <td class="stamp-cell" style="width: 20%; height: 50px; text-align: center; vertical-align: middle; border: 1px solid #000; border-left: none; border-top: none;">印</td>
                                    <td class="stamp-cell" style="width: 20%; height: 50px; text-align: center; vertical-align: middle; border: 1px solid #000; border-top: none;">印</td>
                                    <td class="stamp-cell" style="width: 20%; height: 50px; text-align: center; vertical-align: middle; border: 1px solid #000; border-top: none;">印</td>
                                    <td class="stamp-cell" style="width: 20%; height: 50px; text-align: center; vertical-align: middle; border: 1px solid #000; border-top: none;">印</td>
                                    <td class="stamp-cell" style="width: 20%; height: 50px; text-align: center; vertical-align: middle; border: 1px solid #000; border-right: none; border-top: none;">印</td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </div>

            <!-- 右上のテーブル -->
            <div class="right-table">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 16.67%;">前工程</th>
                            <th style="width: 16.67%;">保管場所</th>
                            <th style="width: 25%;">子品目</th>
                            <th style="width: 16.67%;">規格数量</th>
                            <th style="width: 16.67%;">総数量</th>
                            <th style="width: 8.32%; text-align: center;">単位</th>
                        </tr>
                    </thead>
                    <tbody id="ingredientsTableBody">
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>

                            <td></td>

                            <td></td>
                        </tr>
                        <tr>

                        </tr>
                        <tr>
                            <td></td>

                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>

                            <td></td>

                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>

                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <th style="text-align: left; padding-left: 8px;">規格袋合計</th>
                            <th style="text-align: center;" id="totalStandardBagsTop"></th>
                            <th style="text-align: left; padding-left: 8px;">規格外袋合計</th>
                            <th style="text-align: center;" id="totalIrregularBagsTop"></th>
                            <td style="border: none; background: none;"></td>
                            <td style="border: none; background: none;"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- メインテーブル -->
        <div class="main-table-section">
            <table class="main-table">
                <thead>
                    <tr>
                        <th rowspan="3" style="width: 9%;">施設名</th>
                        <th rowspan="3" style="width: 5%;">規格<br>袋数</th>
                        <th colspan="11" style="width: 86%;">規格外袋（端数）</th>
                    </tr>
                    <tr id="itemHeaderRow">
                        <th class="item-header" style="width: 11%;"></th>

                    </tr>
                    <tr id="unitHeaderRow">

                </thead>
                <tbody id="facilityTableBody">
                    <!-- データ行と合計行はJavaScriptで動的に生成 -->

            </table>

    </div>
</body>
</html>
