<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>袋詰指示書・ラベル管理システム</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <!-- 印刷用スタイル -->
    <style>
        @media print {
            /* 印刷時は通常のページコンテンツを非表示 */
            body > *:not(#print-preview-container) {
                display: none !important;
            }
            
            /* 印刷プレビューコンテナのみ表示 */
            #print-preview-container {
                display: block !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>袋詰指示書・ラベル管理システム</h1>
        </header>

        <!-- 検索エリア -->
        <section class="search-section">
            <h2>受注明細検索</h2>
            <div class="search-form">
                <div class="form-group">
                    <label for="productionDate">製造日:</label>
                    <input type="date" id="productionDate">
                </div>
                <div class="form-group">
                    <label for="productCode">品目コード:</label>
                    <input type="text" id="productCode" placeholder="品目コードを入力">
                </div>
                <button id="searchBtn" class="btn btn-primary">検索</button>
            </div>
        </section>

        <!-- 検索結果エリア -->
        <section class="results-section" id="resultsSection" style="display: none;">
            <h2>検索結果</h2>
            <div class="results-header">
                <span id="resultCount">0件</span>
                <div class="checkbox-controls">
                    <button id="selectAllBtn" class="btn btn-secondary">全選択</button>
                    <button id="deselectAllBtn" class="btn btn-secondary">全解除</button>
                </div>
            </div>
            <div class="table-container">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="headerCheckbox"></th>
                            <th>製造日</th>
                            <th>喫食日</th>
                            <th>喫食時間</th>
                            <th>得意先コード</th>
                            <th>納入場所コード</th>
                            <th>品目コード</th>
                            <th>受注商品名称</th>
                            <th>受注数量</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 印刷エリア -->
        <section class="print-section" id="printSection" style="display: none;">
            <h2>印刷設定</h2>
            <div class="print-mode">
                <label>印刷タイプ:</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="printType" value="instruction" checked>
                        袋詰指示書
                    </label>
                    <label>
                        <input type="radio" name="printType" value="label">
                        ラベル
                    </label>
                </div>
            </div>
            <button id="printBtn" class="btn btn-success">PDF印刷</button>
        </section>
    </div>

    <!-- アプリケーションスクリプト -->
    <script type="module" src="/static/js/api.js"></script>
    <script type="module" src="/static/js/search.js"></script>
    <script type="module" src="/static/js/print.js"></script>
    <script type="module" src="/static/js/pdf_generator.js"></script>
</body>
</html>
